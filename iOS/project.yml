name: Firstedition
options:
  bundleIdPrefix: com.shimondeitel.bookcollectlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Firstedition:
    type: application
    platform: iOS
    sources:
      - path: Firstedition
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bookcollectlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Firstedition/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FirsteditionTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FirsteditionTests
      - path: Firstedition.storekit
    dependencies:
      - target: Firstedition
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bookcollectlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FirsteditionUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FirsteditionUITests
    dependencies:
      - target: Firstedition
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bookcollectlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Firstedition:
    build:
      targets:
        Firstedition: all
        FirsteditionTests: [test]
        FirsteditionUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Firstedition.storekit
    test:
      config: Debug
      storeKitConfiguration: Firstedition.storekit
      targets:
        - FirsteditionTests
        - FirsteditionUITests
    archive:
      config: Release
